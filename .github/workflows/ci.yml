name: Continuous Integration Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Run backend pytest suite
        run: |
          cd backend
          source venv/bin/activate
          PYTHONPATH=. pytest -v

  frontend-tests:
    runs-on: ubuntu-latest
    needs: backend-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: portal-web/package-lock.json

      - name: Install dependencies
        run: |
          cd portal-web
          npm ci

      - name: Run Vitest unit tests
        run: |
          cd portal-web
          npm test

      - name: Install Playwright Browsers
        run: |
          cd portal-web
          npx playwright install --with-deps chromium

      - name: Set up Python for E2E Backend support
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install Backend dependencies
        run: |
          cd backend
          python -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt

      - name: Start FastAPI Backend in background
        run: |
          cd backend
          source venv/bin/activate
          PYTHONPATH=. uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          npx wait-on http-get://localhost:8000/api/current-architecture --timeout 30000

      - name: Run Playwright E2E tests
        run: |
          cd portal-web
          npx playwright test
